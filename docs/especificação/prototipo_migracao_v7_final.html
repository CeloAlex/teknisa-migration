<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protótipo — Plataforma de Migração de Dados - Teknisa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --border:#e2e6ec; --text:#1f2937; --muted:#6b7280;
    --primary:#2554c7; --primary-dark:#1b3d92; --primary-bg:#eaf0ff;
    --green:#1a8754; --green-bg:#e6f6ee;
    --orange:#b8620a; --orange-bg:#fdf1e3;
    --red:#c0392b; --red-bg:#fbeae8;
    --purple:#6c3fc5; --purple-bg:#f1eafc;
    --gray:#6b7280; --gray-bg:#eef0f3;
    --teal:#0f8a8a; --teal-bg:#e3f6f6;
    --radius:10px;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-size:14px;}
  header.topbar{
    background:var(--primary-dark); color:#fff; padding:14px 22px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header.topbar h1{font-size:16px; margin:0; font-weight:600;}
  header.topbar .sub{font-size:12px; opacity:.75; margin-top:2px;}
  nav.topnav{
    background:#16295e; display:flex; gap:4px; padding:0 18px;
  }
  nav.topnav .item{
    padding:11px 16px; color:#c9d4f0; font-size:13px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent;
  }
  nav.topnav .item.active{color:#fff; border-bottom-color:#5c8bff;}
  main.content{padding:22px 26px; max-width:1280px; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:18px;}
  .card h2{margin:0 0 4px 0; font-size:17px;}
  .card h3{font-size:14.5px; margin:18px 0 8px;}
  .card .desc{color:var(--muted); font-size:12.8px; margin-bottom:16px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:12.3px; color:var(--muted); margin-bottom:5px; font-weight:600;}
  select, input[type=text], input[type=number], input[type=date], input[type=email], textarea{
    width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; background:#fff; color:var(--text);
  }
  textarea{resize:vertical; min-height:60px; font-family:inherit;}
  .field{margin-bottom:14px;}
  .btn{
    background:var(--primary); color:#fff; border:none; padding:9px 18px; border-radius:7px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn:hover{background:var(--primary-dark);}
  .btn.secondary{background:var(--gray-bg); color:var(--text);}
  .btn.secondary:hover{background:#e2e6ec;}
  .btn.success{background:var(--green);}
  .btn.success:hover{background:#146942;}
  .btn.danger{background:var(--red);}
  .btn.small{padding:5px 11px; font-size:11.8px;}
  .btn[disabled]{opacity:.4; cursor:not-allowed;}
  .btnbar{display:flex; gap:10px; margin-top:16px; justify-content:flex-end; flex-wrap:wrap;}
  .badge{
    display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px;
    font-size:11.3px; font-weight:700; white-space:nowrap;
  }
  .badge.gray{background:var(--gray-bg); color:var(--gray);}
  .badge.blue{background:var(--primary-bg); color:var(--primary);}
  .badge.orange{background:var(--orange-bg); color:var(--orange);}
  .badge.red{background:var(--red-bg); color:var(--red);}
  .badge.green{background:var(--green-bg); color:var(--green);}
  .badge.purple{background:var(--purple-bg); color:var(--purple);}
  .badge.teal{background:var(--teal-bg); color:var(--teal);}
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th,td{padding:8px 9px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top;}
  th{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.03em; position:sticky; top:0; background:#fff;}
  tr:hover td{background:#fafbfd;}
  .tblwrap{max-height:420px; overflow:auto; border:1px solid var(--border); border-radius:8px;}
  .mono{font-family:"SF Mono", Consolas, monospace; font-size:11.8px;}
  .tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; border-bottom:1px solid var(--border); padding-bottom:0;}
  .tab{
    padding:9px 15px; font-size:12.6px; font-weight:600; cursor:pointer; color:var(--muted);
    border-bottom:2.5px solid transparent; margin-bottom:-1px;
  }
  .tab.active{color:var(--primary); border-bottom-color:var(--primary);}
  .tab.locked{opacity:.4; cursor:not-allowed;}
  .pill-tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .pill{
    padding:6px 13px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer;
    border:1px solid var(--border); background:#fff; color:var(--muted);
  }
  .pill.active{background:var(--text); color:#fff; border-color:var(--text);}
  .counters{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;}
  .counter{flex:1; min-width:110px; background:#fafbfd; border:1px solid var(--border); border-radius:8px; padding:12px 14px;}
  .counter .n{font-size:21px; font-weight:700;}
  .counter .l{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;}
  .progressbar{height:8px; background:var(--gray-bg); border-radius:4px; overflow:hidden; margin:10px 0;}
  .progressbar .fill{height:100%; background:var(--primary); transition:width .4s;}
  .loglist{max-height:260px; overflow:auto; border:1px solid var(--border); border-radius:8px;}
  .logline{padding:8px 12px; border-bottom:1px solid var(--border); font-size:12px; display:flex; gap:10px; align-items:center;}
  .logline:last-child{border-bottom:none;}
  .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .dot.ok{background:var(--green);} .dot.err{background:var(--red);} .dot.pending{background:var(--gray);}
  .codebox{
    background:#0f172a; color:#d1e7ff; padding:14px 16px; border-radius:8px; font-family:"SF Mono",Consolas,monospace;
    font-size:11.5px; line-height:1.6; overflow:auto; max-height:320px; white-space:pre-wrap;
  }
  .banner{padding:12px 14px; border-radius:8px; font-size:12.6px; margin-bottom:16px; display:flex; gap:10px; align-items:flex-start;}
  .banner.warn{background:var(--orange-bg); color:var(--orange);}
  .banner.block{background:var(--red-bg); color:var(--red);}
  .banner.info{background:var(--primary-bg); color:var(--primary);}
  .banner.ok{background:var(--green-bg); color:var(--green);}
  .mig-card{
    display:flex; align-items:center; gap:16px; border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:10px;
  }
  .mig-card .org{font-weight:700; font-size:13.5px; width:190px;}
  .mig-card .info{flex:1; font-size:12px; color:var(--muted);}
  .mig-card .dl{display:flex; gap:6px; flex-wrap:wrap; width:230px;}
  small.hint{color:var(--muted); font-size:11.3px;}
  .diff{display:flex; gap:8px; align-items:center; font-size:12px;}
  .diff .old{color:var(--red); text-decoration:line-through;}
  .diff .new{color:var(--green); font-weight:600;}
  .checkline{display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:8px;}
  .tpl-catalog-card{border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:10px;}
  .tpl-catalog-card .head{display:flex; align-items:center; gap:10px; justify-content:space-between;}
  .tpl-catalog-card .head b{font-size:13.8px;}
  .tpl-catalog-card .metabadges{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
  .dropzone{
    border:2px dashed var(--border); border-radius:8px; padding:26px; text-align:center; color:var(--muted);
    font-size:12.8px; cursor:pointer; background:#fafbfd;
  }
  .dropzone.over{border-color:var(--primary); background:var(--primary-bg); color:var(--primary);}
  .op-choice{display:flex; gap:8px; margin-bottom:14px;}
  .op-choice .opt{
    flex:1; border:1.5px solid var(--border); border-radius:8px; padding:11px; text-align:center; cursor:pointer; font-size:12.6px; font-weight:600; color:var(--muted);
  }
  .op-choice .opt.sel{border-color:var(--primary); background:var(--primary-bg); color:var(--primary);}
  .tpl-inline-block{border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:10px; background:#fcfdfe;}
  .timeline{display:flex; gap:0; margin-bottom:6px; overflow-x:auto;}
  .timeline .tl-item{flex:1; min-width:92px; text-align:center; font-size:10.5px; color:var(--muted); position:relative; padding-top:16px;}
  .timeline .tl-item::before{content:''; position:absolute; top:5px; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%; background:var(--gray-bg); border:2px solid var(--border);}
  .timeline .tl-item.done::before{background:var(--green); border-color:var(--green);}
  .timeline .tl-item.now::before{background:var(--primary); border-color:var(--primary);}
  .kv{display:flex; flex-wrap:wrap; gap:22px; font-size:12.3px; color:var(--muted);}
  .kv b{color:var(--text);}
  .closebar{display:flex; justify-content:flex-end;}
  .linkbtn{background:none;border:none;color:var(--primary); font-size:12.3px; font-weight:600; cursor:pointer; padding:0;}
</style>
</head>
<body>
<header class="topbar">
  <div>
    <h1>Plataforma de Migração de Dados - Teknisa</h1>
  </div>
</header>
<nav class="topnav" id="topnav"></nav>
<main class="content" id="content"></main>

<script>
/* =========================================================================
   1) CATÁLOGO DE TEMPLATES — "dicionário de dados" genérico
   Cada template descreve: aba/planilha, linha de cabeçalho, linha de início
   dos dados, colunas de origem mapeadas para tabela/campo de destino,
   geração de PK (quando aplicável), template real de INSERT extraído das
   planilhas, e as regras de validação observadas.
   ========================================================================= */

// gerador de próximo código livre (equivalente à tabela NOVOCODIGO / "Busca de PK's livres")
const PK_SERVICE = { contadores:{} };
function pkProximoLivre(nrOrg, contador, seed, usados){
  const chave = nrOrg+'|'+contador;
  if(!(chave in PK_SERVICE.contadores)) PK_SERVICE.contadores[chave] = seed;
  let candidato = PK_SERVICE.contadores[chave] + 1;
  while(usados.has(candidato)) candidato++;
  PK_SERVICE.contadores[chave] = candidato;
  return candidato;
}

// ---- funções de conversão (equivalentes às fórmulas TRIM/SUBSTITUTE/TEXT das planilhas) ----
const CONV = {
  trim: v => (v===undefined||v===null) ? '' : String(v).trim(),
  removerMascara: v => (v===undefined||v===null) ? '' : String(v).replace(/[\s\-\.\/\\]/g,''),
  upperSemAcento: v => CONV.trim(v).toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,''),
  zeroEsquerda: (v,n) => CONV.trim(v).padStart(n,'0'),
  dataBR: v => {
    if(v===undefined||v===null||v==='') return '';
    let d;
    if(v instanceof Date) d = v;
    else if(typeof v === 'number') d = XLSX.SSF.parse_date_code(v);
    else { const p = String(v).split(/[\/\-]/); if(p.length===3) return `${p[0].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[2].length===2?'20'+p[2]:p[2]}`; return String(v); }
    if(d && d.y) return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
    if(d instanceof Date) return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    return String(v);
  },
  numeroDecimal: v => (v===undefined||v===null||v==='') ? null : String(v).toString().replace(',','.'),
  vazioParaN: v => CONV.trim(v)==='' ? 'N' : CONV.trim(v),
};

function decCol(letra){ return XLSX.utils.decode_col(letra); }

function ehColunaDePlanilha(col){ return /^[A-Z]+$/.test(col||''); }

// ---- motor genérico orientado por metadados (usado por templates criados via cadastro,
//      sem necessidade de código específico — Secao 2 do documento de especificacao) ----
function lerLinhaGenerica(tpl, row){
  const campos = {};
  tpl.dicionario.forEach(d=>{
    if(!ehColunaDePlanilha(d.col) || d.campo==='—' || !d.campo) return;
    const bruto = row[decCol(d.col)];
    const fn = CONV[d.conversaoFn] || CONV.trim;
    campos[d.campo] = d.conversaoFn ? fn(bruto) : (bruto===undefined?'':bruto);
  });
  return campos;
}
function validarLinhaGenerica(tpl, campos){
  const r = [];
  tpl.dicionario.forEach(d=>{
    if(!d.campo || d.campo==='—') return;
    const v = campos[d.campo];
    if(d.obrigatorio===true && (v===undefined||v===null||v==='')){
      r.push({sev:'erro', campo:d.campo, regra:'obrigatoriedade', recebido:'(vazio)', esperado:d.rotulo, orientacao:`Preencha o campo "${d.rotulo}".`});
    } else if(d.tamanho && v!==undefined && v!==null && String(v).length>d.tamanho){
      r.push({sev:'alerta', campo:d.campo, regra:'tamanho_maximo', recebido:String(v), esperado:`ate ${d.tamanho} caracteres`, orientacao:`Confira o valor de "${d.rotulo}".`});
    }
  });
  return r;
}
function gerarInsertGenerica(tpl, campos, ctx, pk){
  // se o template tiver um "template de script" manual com marcadores @CAMPO@ (o mesmo padrao
  // observado nas seis planilhas originais), o motor faz substituicao de marcador — mais fiel
  // ao que um DBA escreveria a mao (NVL, subqueries, LPAD etc). Caso contrario, cai no builder
  // automatico simples (INSERT INTO tabela (colunas) VALUES (valores)).
  // campos com PK gerada automaticamente (Busca de PK's livres / NOVOCODIGO) nao vem no "campos"
  // lido da planilha — vem do objeto "pk" calculado em computarInsertLinha. O dicionario marca
  // esses campos com col:'(gerado)' (nao e uma coluna real da planilha).
  if(tpl.scriptTemplateManual){
    let sql = tpl.scriptTemplateManual;
    tpl.dicionario.forEach(d=>{
      if(!d.marcador || !d.marcador.startsWith('@')) return;
      const gerado = pk && Object.prototype.hasOwnProperty.call(pk, d.campo);
      const v = gerado ? pk[d.campo] : campos[d.campo];
      sql = sql.split(d.marcador).join((v===undefined||v===null)?'':String(v));
    });
    sql = sql.split('@NRORG@').join(ctx.nrOrg).split('@USUARIO_TECNICO@').join(ctx.usuarioTecnico);
    return sql;
  }
  const porTabela = {};
  tpl.dicionario.forEach(d=>{
    if(!d.campo || d.campo==='—' || !d.tabela || d.tabela==='—' || d.tabela==='todas' || d.tabela==='variável') return;
    (porTabela[d.tabela] = porTabela[d.tabela]||[]).push(d);
  });
  const partes = Object.entries(porTabela).map(([tabela, camposDef]) => {
    const colunas = ['NRORG', ...camposDef.map(d=>d.campo)];
    const valores = [ctx.nrOrg, ...camposDef.map(d=>{
      const v = campos[d.campo];
      if(v===undefined||v===null||v==='') return 'NULL';
      return (d.tipo==='numerico'||d.tipo==='booleano') ? v : `'${v}'`;
    })];
    return `INSERT INTO ${tabela} ( ${colunas.join(', ')}, DTINCLUSAO, NRORGINCLUSAO, CDOPERINCLUSAO ) VALUES ( ${valores.join(', ')}, SYSDATE, ${ctx.nrOrg}, '${ctx.usuarioTecnico}' );`;
  });
  partes.push('COMMIT;');
  return partes.join('\n');
}


const TEMPLATE_CATALOG = {

  agencias: {
    id:'agencias', nome:'Agências Bancárias', arquivoExemplo:'00_Agencias_Bancarias.xlsx',
    formato:'XLSX', sheetName:'Sheet1', headerRow:1, dataStartRow:2,
    operacoesPermitidas:['INCLUSAO','ALTERACAO','EXCLUSAO'],
    tabelas:['AGENCIA'],
    pkGeracao:null,
    dicionario:[
      {col:'A', rotulo:'Banco', marcador:'@CDBANCO@', tabela:'AGENCIA', campo:'CDBANCO', tipo:'texto', tamanho:3, obrigatorio:true, conversao:'trim', chave:'PK'},
      {col:'B', rotulo:'Cd. Agência', marcador:'@CDAGENCIA@', tabela:'AGENCIA', campo:'CDAGENCIA', tipo:'texto', tamanho:4, obrigatorio:true, conversao:'trim', chave:'PK'},
      {col:'C', rotulo:'Agência', marcador:'@NMAGENCIA@', tabela:'AGENCIA', campo:'NMAGENCIA', tipo:'texto', tamanho:60, obrigatorio:true, conversao:'trim', chave:''},
      {col:'D1', rotulo:'Organização (célula fixa no arquivo original)', marcador:'@NRORG@', tabela:'AGENCIA', campo:'NRORG', tipo:'numerico', tamanho:null, obrigatorio:true, conversao:'—', chave:'FK', obs:'No motor genérico este valor NÃO é lido do arquivo: vem do contexto da migração (organização selecionada na criação).'},
    ],
    lerLinha(row){
      return {
        CDBANCO: CONV.trim(row[decCol('A')]),
        CDAGENCIA: CONV.trim(row[decCol('B')]),
        NMAGENCIA: CONV.trim(row[decCol('C')]),
      };
    },
    validarLinha(campos, ctx){
      const r = [];
      if(!campos.CDBANCO) r.push({sev:'erro', campo:'CDBANCO', regra:'obrigatoriedade', recebido:'(vazio)', esperado:'código do banco (3 dígitos)', orientacao:'Preencha o código do banco.'});
      else if(campos.CDBANCO.length>3) r.push({sev:'alerta', campo:'CDBANCO', regra:'tamanho_maximo', recebido:campos.CDBANCO, esperado:'até 3 caracteres', orientacao:'Confira o código do banco.'});
      if(!campos.CDAGENCIA) r.push({sev:'erro', campo:'CDAGENCIA', regra:'obrigatoriedade', recebido:'(vazio)', esperado:'código da agência (4 dígitos)', orientacao:'Preencha o código da agência.'});
      if(!campos.NMAGENCIA) r.push({sev:'erro', campo:'NMAGENCIA', regra:'obrigatoriedade', recebido:'(vazio)', esperado:'nome/descrição da agência', orientacao:'Preencha o nome da agência.'});
      const existe = ctx.baseMock.AGENCIA.some(x=>x.CDBANCO===campos.CDBANCO && x.CDAGENCIA===campos.CDAGENCIA);
      if(existe) r.push({sev:'alerta', campo:'CDBANCO/CDAGENCIA', regra:'duplicidade_no_destino', recebido:`${campos.CDBANCO}/${campos.CDAGENCIA}`, esperado:'combinação inexistente no destino', orientacao:'Registro já existe no destino — script de INCLUSÃO será convertido em no-op (idempotência); considere operação de ALTERAÇÃO.'});
      return r;
    },
    gerarInsert(campos, ctx){
      return `INSERT INTO AGENCIA ( CDBANCO,CDAGENCIA, NMAGENCIA, NRORG, DTINCLUSAO, CDOPERINCLUSAO, NRORGINCLUSAO, IDATIVO ) VALUES ( '${campos.CDBANCO}', '${campos.CDAGENCIA}', '${campos.NMAGENCIA}', ${ctx.nrOrg}, SYSDATE, '${ctx.usuarioTecnico}', ${ctx.nrOrg}, 'S' );`;
    },
    pkFields:{AGENCIA:['CDBANCO','CDAGENCIA']},
    baseMockSeed:{AGENCIA:[{CDBANCO:'001', CDAGENCIA:'0019'}]},
  },

  estrutura: {
    id:'estrutura', nome:'Estrutura Organizacional', arquivoExemplo:'01_Estrutura_v12.xlsx',
    formato:'XLSX', sheetName:'Dados', headerRow:2, dataStartRow:3,
    operacoesPermitidas:['INCLUSAO','ALTERACAO','EXCLUSAO'],
    tabelas:['PARCNEGOCIO','ESTRUTURAM','ESTRUTURAH','ENDERECOPARC'],
    pkGeracao:[
      {campo:'NRPARCNEGOCIO', tabela:'PARCNEGOCIO', seed:1739},
      {campo:'NRESTRUTURAM', tabela:'ESTRUTURAM', seed:167},
      {campo:'NRESTRUTURAH', tabela:'ESTRUTURAH', seed:167},
      {campo:'NRENDERECOPARC', tabela:'ENDERECOPARC', seed:1719},
    ],
    dicionario:[
      {col:'A', rotulo:'Tipo de Estrutura Teknisa', marcador:'@NRTPESTRUTURA@', tabela:'ESTRUTURAM', campo:'NRTIPOESTRUTURA', tipo:'numerico', obrigatorio:true, conversao:'—', chave:'FK'},
      {col:'B', rotulo:'Início de Vigência', marcador:'@DTINIVIGENCIA@', tabela:'ESTRUTURAM', campo:'DTINIVIGENCIA', tipo:'data', obrigatorio:true, conversao:'dataBR', chave:''},
      {col:'C', rotulo:'Fim de Vigência', marcador:'@DTFIMVIGENCIA@', tabela:'ESTRUTURAM', campo:'DTFIMVIGENCIA', tipo:'data', obrigatorio:false, conversao:'dataBR', chave:''},
      {col:'D', rotulo:'Nº Estrutura', marcador:'@NRESTRUTURA@', tabela:'ESTRUTURAM', campo:'CDINTESTRUTURA', tipo:'texto', obrigatorio:true, conversao:'trim', chave:'Identificador de negócio (usado na checagem de existência)'},
      {col:'E', rotulo:'Mês Competência', marcador:'@COMPETENCIA@', tabela:'ESTRUTURAH', campo:'DTMESCOMPETENC', tipo:'data', obrigatorio:true, conversao:'dataBR', chave:''},

// implementação de lerLinha/validarLinha/gerarInsert para Estrutura, Ocupação e Escala
TEMPLATE_CATALOG.estrutura.lerLinha = function(row){
  const g = c => row[decCol(c)];
  const cnpj = CONV.removerMascara(g('F'));
  const cei = CONV.removerMascara(g('G'));
  const razaoSocial = CONV.trim(String(g('H')||'').replace(/['&]/g,''));
  const nomeFantasia = CONV.trim(String(g('Z')||'').replace(/['&]/g,''));
  const nomeEstrutura = CONV.trim(String(g('AA')||'').replace(/['&]/g,''));
  const nmPrincipalParc = razaoSocial || nomeFantasia || nomeEstrutura || `Estrutura ${g('D')}`;
  return {
    NRTPESTRUTURA: g('A'), DTINIVIGENCIA: CONV.dataBR(g('B')), DTFIMVIGENCIA: CONV.dataBR(g('C')),
    NRESTRUTURA: CONV.trim(g('D')), COMPETENCIA: CONV.dataBR(g('E')),
    CNPJ: cnpj, CEI: cei, RAZAOSOCIAL: razaoSocial,
    NATJURIDICA: CONV.trim(g('I')), CDCNAE: CONV.trim(g('J')), CDCAGED: CONV.trim(g('L')),
    IDTPEMPRESA: g('M'), IDSIMPLES: CONV.vazioParaN(g('N')), IDPARTICIPAT: CONV.trim(g('O')),
    IDENDERECO: CONV.trim(g('P')), CDPAIS: CONV.zeroEsquerda(g('Q')||'', 4), SGESTADO: CONV.trim(g('R')),
    MUNICIPIO: CONV.upperSemAcento(g('S')), LOGRADOURO: CONV.trim(g('T')), ENDERECO: CONV.trim(g('U')),
    NUMERO: CONV.trim(g('V')), BAIRRO: CONV.trim(g('W')), CEP: CONV.removerMascara(g('X')),
    REFERENCIAENDERECO: CONV.trim(g('Y')), NMFANTASIA: nomeFantasia, NMESTRUTURA: nomeEstrutura,
    NMPRINCIPALPARC: nmPrincipalParc,
    CDCPFESTRUTURA: CONV.removerMascara(g('AB')), DTBASESINDICAL: CONV.dataBR(g('AC')), CDSINDICAL: CONV.trim(g('AD')),
    _temEndereco: !!(CONV.trim(g('P')) && CONV.trim(g('T'))),
  };
};
TEMPLATE_CATALOG.estrutura.validarLinha = function(campos, ctx){
  const r = [];
  if(!campos.NRESTRUTURA) r.push({sev:'erro', campo:'NRESTRUTURA', regra:'obrigatoriedade', recebido:'(vazio)', esperado:'Nº de estrutura', orientacao:'Preencha o número da estrutura.'});
  if(!campos.DTINIVIGENCIA) r.push({sev:'erro', campo:'DTINIVIGENCIA', regra:'obrigatoriedade', recebido:'(vazio)', esperado:'data de início de vigência', orientacao:'Preencha a data de início de vigência.'});
  if(campos.CNPJ && campos.CNPJ.length!==14) r.push({sev:'alerta', campo:'CNPJ', regra:'tamanho_cnpj', recebido:campos.CNPJ, esperado:'14 dígitos', orientacao:'Confirme o CNPJ informado.'});
  if(campos.CNPJ) r.push({sev:'ajuste', campo:'CNPJ', regra:'remocao_mascara', recebido: '(máscara original)', esperado:'somente dígitos', orientacao:'Máscara removida automaticamente; valor original preservado no staging bruto.', ajustado:campos.CNPJ});
  if(!campos.CDSINDICAL) r.push({sev:'recomendacao', campo:'CDSINDICAL', regra:'dominio_nao_documentado', recebido:'(vazio)', esperado:'código de sindicato válido', orientacao:'Domínio de sindicatos não documentado na planilha original — validar tabela de apoio com a equipe funcional.'});
  const existe = ctx.baseMock.ESTRUTURAM.some(x=>x.CDINTESTRUTURA===campos.NRESTRUTURA);
  if(existe) r.push({sev:'alerta', campo:'NRESTRUTURA', regra:'existencia_previa', recebido:campos.NRESTRUTURA, esperado:'estrutura inexistente no destino', orientacao:'Estrutura já existe no destino (equivalente ao "não" da coluna AE da planilha original) — linha não gerará INSERT.'});
  if(campos.IDENDERECO && !campos.LOGRADOURO) r.push({sev:'alerta', campo:'LOGRADOURO', regra:'preenchimento_condicional', recebido:'(vazio)', esperado:'logradouro preenchido quando há tipo de endereço', orientacao:'Endereço não será inserido: exige tipo de endereço E logradouro preenchidos (regra AND observada na planilha).'});
  return r;
};
TEMPLATE_CATALOG.estrutura.gerarInsert = function(campos, ctx, pk){
  const partes = [];
  partes.push(`INSERT INTO PARCNEGOCIO ( NRORG, NRPARCNEGOCIO, NMPRINCIPALPARC, NMSECUNDARIPARC, NRINSCRICAOPARC, IDATIVO, DTINCLUSAO, NRORGINCLUSAO, CDOPERINCLUSAO, CDTIPOPARCPRINCIPAL, CDTIPOINSCRICAO, IDPESSOAFISICA, IDINSTITUICAO, IDPARCFUNDIDO ) VALUES ( ${ctx.nrOrg}, ${pk.NRPARCNEGOCIO}, '${campos.NMPRINCIPALPARC}', '${campos.NMPRINCIPALPARC}', '${campos.CNPJ}', 'S', SYSDATE, ${ctx.nrOrg}, '${ctx.usuarioTecnico}', 'ESTRUTURA', 'CNPJ', 'N', 'N', 'N' );`);
  partes.push(`INSERT INTO ESTRUTURAM ( NRORG, NRESTRUTURAM, NRPARCNEGOCIO, CDINTESTRUTURA, NRTIPOESTRUTURA, DTINIVIGENCIA, DTFIMVIGENCIA, NMESTRUTURAM, IDATIVO, DTINCLUSAO, CDOPERINCLUSAO ) VALUES ( ${ctx.nrOrg}, ${pk.NRESTRUTURAM}, ${pk.NRPARCNEGOCIO}, '${campos.NRESTRUTURA}', ${campos.NRTPESTRUTURA}, '${campos.DTINIVIGENCIA}', '${campos.DTFIMVIGENCIA}', NVL( '${campos.NMESTRUTURA}', NVL( '${campos.NMFANTASIA}', '${campos.RAZAOSOCIAL}' ) ), 'S', SYSDATE, '${ctx.usuarioTecnico}');`);
  partes.push(`INSERT INTO ESTRUTURAH ( NRORG, NRESTRUTURAM, NRESTRUTURAH, NRPARCNEGOCIO, DTMESCOMPETENC, CDCNPJESTRUT, CDCEIESTRUT, NMRAZSOCESTRUT, NMFANTASIA, NMESTRUTURAH, CDNATUJURI, CDCNAE, NRCAGED, IDTIPOEMPR, IDOPTSIMPLES, IDPARTICIPAT, CDCPFESTRUTURA, DTBASESINDICAL, CDSINDICAL, IDATIVO, DTINCLUSAO, CDOPERINCLUSAO) VALUES ( ${ctx.nrOrg}, ${pk.NRESTRUTURAM}, ${pk.NRESTRUTURAH}, ${pk.NRPARCNEGOCIO}, '${campos.COMPETENCIA}', '${campos.CNPJ}', '${campos.CEI}', '${campos.RAZAOSOCIAL}', '${campos.NMFANTASIA}', NVL( '${campos.NMESTRUTURA}', NVL( '${campos.NMFANTASIA}', '${campos.RAZAOSOCIAL}' ) ), '${campos.NATJURIDICA}', '${campos.CDCNAE}', '${campos.CDCAGED}', '${campos.IDTPEMPRESA}', NVL( '${campos.IDSIMPLES}', 'N' ), '${campos.IDPARTICIPAT}', '${campos.CDCPFESTRUTURA}', '${campos.DTBASESINDICAL}', '${campos.CDSINDICAL}', 'S', SYSDATE, '${ctx.usuarioTecnico}');`);
  if(campos._temEndereco){
    partes.push(`INSERT INTO ENDERECOPARC ( NRORG, NRENDERECOPARC, NRPARCNEGOCIO, CDTIPOENDERECO, IDATIVO, DTINCLUSAO, CDOPERINCLUSAO, CDPAIS, SGESTADO, CDLOGRADOURO, NMBAIRROENDERECO, DSREFERENCIAENDE, NRCEPENDERECO, DSENDERECO, NRIMOVELENDERECO, CDMUNICIPIO ) VALUES ( ${ctx.nrOrg}, ${pk.NRENDERECOPARC}, ${pk.NRPARCNEGOCIO}, '${campos.IDENDERECO}', 'S', SYSDATE, '${ctx.usuarioTecnico}', LPAD( '${campos.CDPAIS}', 4, '0' ), '${campos.SGESTADO}', '${campos.LOGRADOURO}', '${campos.BAIRRO}', '${campos.REFERENCIAENDERECO}', '${campos.CEP}', '${campos.ENDERECO}', '${campos.NUMERO}', ( SELECT MAX( CDMUNICIPIO ) FROM MUNICIPIO WHERE UPPER( NMMUNICIPIO ) = '${campos.MUNICIPIO}' AND CDPAIS = LPAD( '${campos.CDPAIS}', 4, '0' ) AND SGESTADO = '${campos.SGESTADO}' ) );`);
  }
  partes.push('COMMIT;');

// popula linhasLidas + validacoes (e, opcionalmente, scripts) de um template dentro de uma migracao,
// reaproveitando o mesmo motor (tpl.validarLinha / tpl.gerarInsert) usado pela importacao real via upload.
function semearTemplate(m, tid, linhas, opts){
  opts = opts || {};
  const tpl = TEMPLATE_CATALOG[tid];
  const st = m.templatesState[tid];
  st.arquivoOriginal = new File(['(conteudo de exemplo - migracao semeada para demonstracao de layout)'], tpl.arquivoExemplo, {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  st.linhasLidas = linhas;
  const ctx = {nrOrg:m.org.id, usuarioTecnico:'000000099991', baseMock: baseMockContexto(tpl)};
  st.validacoes = [];
  linhas.forEach((campos, idx)=>{
    tpl.validarLinha(campos, ctx).forEach(r=> st.validacoes.push({linha: idx + tpl.dataStartRow, ...r}));
  });
  st.status = st.validacoes.some(v=>v.sev==='erro') ? 'com erro' : 'validado';
  if(opts.dadosAprovados || opts.comScript) st.dadosAprovados = true;
  if(opts.comScript){
    const validas = linhas.filter((_,idx)=> !st.validacoes.some(v=>v.linha===idx+tpl.dataStartRow && v.sev==='erro'));
    st.sqlGerado = validas.map(campos=>computarInsertLinha(tpl, campos, ctx)).join('\n');
    st.jsonGerado = JSON.stringify(st.linhasLidas, null, 2);
    st.csvGerado = toCSV(st.linhasLidas);
  }
  if(opts.scriptAprovado) st.scriptAprovado = true;
  if(opts.aplicado) st.execucaoStatus = 'aplicado';
}

function baixarArquivo(nome, conteudo, mime){
  const blob = new Blob([conteudo], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = nome; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
}
function baixarBlobOriginal(file, nome){
  const url = URL.createObjectURL(file);
  const a = document.createElement('a'); a.href = url; a.download = nome; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
}
function toCSV(rows){
  if(!rows.length) return '';
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_'));
  const lines = [cols.join(';')];
  rows.forEach(r=> lines.push(cols.map(c=> (r[c]===undefined||r[c]===null) ? '' : String(r[c]).replace(/;/g,',')).join(';')) );
  return lines.join('\n');
}

  if(tela!=='painel' && state.usuario.papel!=='administrador') return;
  state.tela = tela; state.migracaoAtualId=null; renderAll();
}
function renderAll(){
  if(!state.usuario){
    document.getElementById('topnav').innerHTML = '';
    document.getElementById('content').innerHTML = USERS.length ? screenLogin() : screenPrimeiroAcesso();
    return;
  }
  renderTopnav();
  const c = document.getElementById('content');
  if(state.tela==='painel') c.innerHTML = screenPainel();
  else if(state.tela==='templates' && state.usuario.papel==='administrador') c.innerHTML = screenTemplatesCatalog();
  else if(state.tela==='tipos' && state.usuario.papel==='administrador') c.innerHTML = screenTipos();
  else if(state.tela==='operadores' && state.usuario.papel==='administrador') c.innerHTML = screenOperadores();
  else if(state.tela==='migracao') c.innerHTML = screenMigracao();
  else c.innerHTML = screenPainel();
}

function removerOperador(id){
  const u = USERS.find(x=>x.id===id);
  if(!u) return;
  if(u.papel==='administrador' && USERS.filter(x=>x.papel==='administrador').length<=1){
    alert('Não é possível remover o único administrador restante.'); return;
  }
  const idx = USERS.findIndex(x=>x.id===id);
  USERS.splice(idx,1);
  document.getElementById('content').innerHTML = screenOperadores();
}

/* =========================================================================
   6) TELA — PAINEL DE MIGRAÇÕES
   ========================================================================= */
function migracoesVisiveis(){
  return state.usuario.papel==='administrador' ? MIGRACOES : MIGRACOES.filter(m=>m.org.id===state.usuario.orgId);
}
function migracoesFiltradas(){
  const f = state.filtroPainel;
  let list = migracoesVisiveis();
  if(!f.incluirConcluidas) list = list.filter(m=>!['concluida','concluida alertas','cancelada'].includes(m.status));
  if(f.status) list = list.filter(m=>m.status===f.status);
  if(f.operador) list = list.filter(m=>m.operador===f.operador);
  if(f.banco) list = list.filter(m=>m.banco===f.banco);
  if(f.dataIni) list = list.filter(m=>m.criadoEmDate >= new Date(f.dataIni+'T00:00:00'));
  if(f.dataFim) list = list.filter(m=>m.criadoEmDate <= new Date(f.dataFim+'T23:59:59'));
  return list.slice().sort((a,b)=> b.criadoEmDate - a.criadoEmDate);
}
function aplicarFiltrosPainel(){
  state.filtroPainel = {
    status: document.getElementById('fltStatus').value,
    operador: document.getElementById('fltOperador').value,
    banco: document.getElementById('fltBanco').value,
    dataIni: document.getElementById('fltDataIni').value,
    dataFim: document.getElementById('fltDataFim').value,
    incluirConcluidas: document.getElementById('fltIncluirConcluidas').checked,
  };
  renderAll();
}
function limparFiltrosPainel(){
  state.filtroPainel = {status:'', operador:'', banco:'', dataIni:'', dataFim:'', incluirConcluidas:false};
  renderAll();
}
function renderFiltrosPainel(){
  const f = state.filtroPainel;
  const operadores = [...new Set(migracoesVisiveis().map(m=>m.operador))].sort();
  return `
    <div class="card">
      <h3 style="margin-top:0;">Filtros</h3>
      <div class="grid2">
        <div class="field"><label>Status</label>
          <select id="fltStatus" onchange="aplicarFiltrosPainel()">
            <option value="">Todos</option>
            ${Object.keys(STATUS_META).map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${STATUS_META[s].label}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Operador</label>
          <select id="fltOperador" onchange="aplicarFiltrosPainel()">
            <option value="">Todos</option>
            ${operadores.map(o=>`<option value="${o}" ${f.operador===o?'selected':''}>${o}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>Banco de destino</label>
          <select id="fltBanco" onchange="aplicarFiltrosPainel()">
            <option value="">Todos</option>
            ${BANCOS.map(b=>`<option value="${b.id}" ${f.banco===b.id?'selected':''}>${b.nome}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Período (criada em)</label>
          <div style="display:flex; gap:8px;">
            <input type="date" id="fltDataIni" value="${f.dataIni}" onchange="aplicarFiltrosPainel()">
            <input type="date" id="fltDataFim" value="${f.dataFim}" onchange="aplicarFiltrosPainel()">
          </div>
        </div>
      </div>
      <div class="checkline"><input type="checkbox" id="fltIncluirConcluidas" ${f.incluirConcluidas?'checked':''} onchange="aplicarFiltrosPainel()"> Incluir migrações concluídas/canceladas</div>
      <div class="btnbar"><button class="btn secondary small" onclick="limparFiltrosPainel()">Limpar filtros</button></div>
    </div>
  `;
}
function screenPainel(){
  const visiveis = migracoesFiltradas();
  return `
    ${renderFiltrosPainel()}
    <div class="card">
      <h2>Painel de Migrações</h2>
      <div class="desc">
        ${state.usuario.papel==='administrador'
          ? 'Visão de administrador — todas as organizações. Cada linha é uma migração; a borda colorida e os contadores refletem o resultado da validação.'
          : `Visão de operador — exibindo apenas migrações da organização vinculada ao seu usuário (${ORGANIZACOES.find(o=>o.id===state.usuario.orgId).nome}).`}
        Por padrão são exibidas apenas migrações ainda não concluídas — use os filtros acima para localizar outras. Downloads disponíveis já refletem o status atual (Seção 4.1 / Anexo A do documento de especificação — uma organização não pode ter mais de uma migração ativa simultaneamente).
      </div>
      ${visiveis.map(m=>renderMigCard(m)).join('') || '<p class="hint">Nenhuma migração encontrada para os filtros selecionados.</p>'}
      <div class="btnbar"><button class="btn" onclick="abrirNovaMigracao()">+ Nova migração</button></div>
    </div>
    <div class="card" id="formNovaMigracao" style="display:none;">${formNovaMigracao()}</div>
  `;
}
function renderMigCard(m){
  const scriptsOk = Object.values(m.templatesState).some(t=>t.sqlGerado);
  const validadosOk = Object.values(m.templatesState).some(t=>t.jsonGerado);
  let erros=0, alertas=0;
  Object.values(m.templatesState).forEach(st=>{
    (st.validacoes||[]).forEach(v=>{ if(v.sev==='erro') erros++; else if(v.sev==='alerta') alertas++; });
  });
  const algumValidado = Object.values(m.templatesState).some(t=>t.linhasLidas && t.linhasLidas.length);
  const corBorda = erros>0 ? 'var(--red)' : alertas>0 ? 'var(--orange)' : algumValidado ? 'var(--green)' : 'var(--border)';
  return `
    <div class="mig-card" style="border-left:4px solid ${corBorda};">
      <div class="org">${m.org.nome}<br><small class="hint">${m.id} · ${m.tipo.nome}</small></div>
      <div class="info">
        Banco: <b>${m.banco}</b> · Operador: ${m.operador} · Criada em: ${m.criadoEm} · Status: ${badge(m.status)}
        ${erros>0 ? `<br><span class="badge red">${erros} erro(s) pendente(s)</span>` : ''}
        ${alertas>0 ? ` <span class="badge orange">${alertas} alerta(s)</span>` : ''}
        ${erros===0 && algumValidado ? ` <span class="badge green">Validação OK</span>` : ''}
      </div>
      <div class="dl">
        <button class="btn secondary small" onclick="abrirMigracao('${m.id}')">Abrir</button>
        ${scriptsOk ? `<button class="btn secondary small" onclick="baixarTudoSQL('${m.id}')">.sql</button>` : ''}
        ${validadosOk ? `<button class="btn secondary small" onclick="baixarTudoJSON('${m.id}')">.json</button>` : ''}
        ${validadosOk ? `<button class="btn secondary small" onclick="baixarTudoCSV('${m.id}')">.csv</button>` : ''}
      </div>
    </div>`;
}
function abrirNovaMigracao(){
  const el = document.getElementById('formNovaMigracao');

function atualizarBancosCompativeis(){
  const tipoId = document.getElementById('nmTipo').value;
  const sel = document.getElementById('nmBanco');
  const tipo = TIPOS_MIGRACAO.find(t=>t.id===tipoId);
  sel.innerHTML = tipo ? tipo.bancosSuportados.map(b=>`<option value="${b}">${BANCOS.find(x=>x.id===b).nome}</option>`).join('') : '<option value="">—</option>';

function criarMigracao(){
  let orgId = document.getElementById('nmOrg').value;
  if(state.usuario.papel!=='administrador') orgId = state.usuario.orgId; // reforca no "servidor" (aqui, no proprio motor) a restricao ja aplicada na UI
  const tipoId = document.getElementById('nmTipo').value;
  const banco = document.getElementById('nmBanco').value;
  const operador = document.getElementById('nmOperador').value;
  if(!orgId||!tipoId||!banco||!operador){ alert('Preencha organização, tipo de migração, banco de destino e operador.'); return; }
  const id = 'MG-' + (1000 + MIGRACOES.length + 1);
  const m = novaMigracaoBase(id, orgId, tipoId, banco, operador, 'aguardando arquivos');
  MIGRACOES.push(m);
  state.migracaoAtualId = id; state.tela='migracao';
  renderAll();

function abrirMigracao(id){
  const m = MIGRACOES.find(x=>x.id===id);
  if(!m){ return; }
  if(state.usuario.papel!=='administrador' && m.org.id!==state.usuario.orgId){
    alert('Seu usuário não tem acesso a migrações de outra organização.'); return;
  }
  state.migracaoAtualId = id; state.tela='migracao'; renderAll();
}

function baixarTudoSQL(id){
  const m = MIGRACOES.find(x=>x.id===id);
  const sql = Object.values(m.templatesState).filter(t=>t.sqlGerado).map(t=>t.sqlGerado).join('\n\n');
  baixarArquivo(`${id}_scripts.sql`, sql || '-- nenhum script gerado ainda', 'application/sql');
}
function baixarTudoJSON(id){
  const m = MIGRACOES.find(x=>x.id===id);
  const obj = {}; Object.entries(m.templatesState).forEach(([k,v])=> obj[k]=v.linhasLidas);
  baixarArquivo(`${id}_dados.json`, JSON.stringify(obj,null,2), 'application/json');
}
function baixarTudoCSV(id){
  const m = MIGRACOES.find(x=>x.id===id);
  Object.entries(m.templatesState).forEach(([k,v])=>{
    if(v.linhasLidas && v.linhasLidas.length) baixarArquivo(`${id}_${k}.csv`, toCSV(v.linhasLidas), 'text/csv');
  });
}

/* =========================================================================

   ========================================================================= */
function migAtual(){ return MIGRACOES.find(m=>m.id===state.migracaoAtualId); }

function templateLiberado(m, tid){
  if(!m.tipo.sequenciaObrigatoria) return true;
  const deps = (m.tipo.dependencias && m.tipo.dependencias[tid]) || [];
  return deps.every(d => ['validado','aprovado'].includes(m.templatesState[d].status));
}

function abaLiberada(m, aba){
  const algumValidado = Object.values(m.templatesState).some(t=>t.linhasLidas && t.linhasLidas.length && t.validacoes);
  const algumDadosAprovados = Object.values(m.templatesState).some(t=>t.dadosAprovados);
  const algumScriptGerado = Object.values(m.templatesState).some(t=>t.sqlGerado);
  const algumScriptAprovado = Object.values(m.templatesState).some(t=>t.scriptAprovado);
  if(aba==='templates') return true;
  if(aba==='validacao') return algumValidado;
  if(aba==='aprovacao') return algumValidado;
  if(aba==='scripts') return algumDadosAprovados;
  if(aba==='aprovacaoTecnica') return algumScriptGerado;
  if(aba==='execucao') return algumScriptAprovado;
  if(aba==='relatorio') return m.execucaoProgresso>=100;
  if(aba==='downloads') return true;
  return false;
}

  const m = migAtual();

          return `<div class="tab ${m.abaAtiva===a.key?'active':''} ${!liberada?'locked':''}" onclick="${liberada?`mudarAba('${a.key}')`:''}">${a.label}</div>`;

function mudarAba(key){ migAtual().abaAtiva = key; renderAll(); }

function renderAbaConteudo(m){
  switch(m.abaAtiva){
    case 'templates': return abaTemplates(m);
    case 'validacao': return abaValidacao(m);
    case 'aprovacao': return abaAprovacao(m);
    case 'scripts': return abaScripts(m);
    case 'aprovacaoTecnica': return abaAprovacaoTecnica(m);
    case 'execucao': return abaExecucao(m);
    case 'relatorio': return abaRelatorio(m);

function statusTplBadge(st){
  const map = {pendente:['gray','Pendente'], processando:['blue','Processando em lotes...'], carregado:['blue','Arquivo carregado'], 'em validacao':['orange','Em validação'], validado:['green','Validado'], 'com erro':['red','Com erro']};
  const [cls,label] = map[st]||['gray',st];
  return `<span class="badge ${cls}">${label}</span>`;

function renderTemplateBlock(m, tid){
  const tpl = TEMPLATE_CATALOG[tid];
  const st = m.templatesState[tid];
  const liberado = templateLiberado(m, tid);
  return `
    <div class="tpl-catalog-card ${!liberado?'locked':''}" style="${!liberado?'opacity:.5;':''}">
      <div class="head">
        <div><b>${tpl.nome}</b> ${statusTplBadge(st.status)} ${!liberado?'<span class="badge gray">Bloqueado — aguarda dependência</span>':''}</div>

  `;

function toggleTemplateInline(tid){
  const m = migAtual();
  m.templateAberto = (m.templateAberto===tid) ? null : tid;
  renderAll();
}
function renderTemplateInline(tid){
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  if(tpl.simulacaoDisponivel===false){
    return `<div class="tpl-inline-block">
      <div class="banner warn">Simulação completa ainda não disponível para este template neste protótipo (dicionário parcial / formato XML sem amostra real). Estrutura de configuração já demonstrada no Dicionário de Dados.</div>
      ${tpl.formato==='XML' ? `<button class="btn secondary" onclick="previewESocial('${tid}')">Pré-visualizar XML como planilha</button><div id="esocialPreview_${tid}"></div>` : ''}
    </div>`;
  }
  let corpo;
  if(st.status === 'processando'){
    const pct = st.totalLinhas ? Math.round((st.linhasProcessadas/st.totalLinhas)*100) : 0;
    corpo = `
      <div class="banner info">Importação processada em lotes, de forma assíncrona — equivalente ao processamento em background/staging descrito na Seção 7 do documento de especificação. Em produção, este progresso ficaria persistido no servidor: o operador poderia fechar a aba e retomar depois de onde parou.</div>
      <div class="progressbar"><div class="fill" style="width:${pct}%"></div></div>
      <small class="hint">${st.linhasProcessadas} de ${st.totalLinhas} linha(s) processada(s) (${pct}%)</small>
      <div class="btnbar">
        ${st.pausado
          ? `<button class="btn secondary" onclick="continuarProcessamento('${tid}')">Continuar processamento</button>`
          : `<button class="btn secondary" onclick="pausarProcessamento('${tid}')">Pausar</button>`}
      </div>`;
  } else if(st.linhasLidas && st.linhasLidas.length){
    corpo = renderPreviewHtml(tid) + `<div class="btnbar"><button class="btn secondary" onclick="reiniciarUpload('${tid}')">Importar outro arquivo</button></div>`;
  } else {
    corpo = `
      <div class="field" style="margin-top:14px;">
        <label>Arquivo (${tpl.arquivoExemplo})</label>
        <div class="dropzone" id="dz_${tid}" onclick="document.getElementById('file_${tid}').click()"
             ondragover="event.preventDefault(); this.classList.add('over')"
             ondragleave="this.classList.remove('over')"
             ondrop="event.preventDefault(); this.classList.remove('over'); handleArquivo('${tid}', event.dataTransfer.files[0])">
          Arraste o arquivo .xlsx aqui ou clique para selecionar — arquivos grandes são lidos e processados em lotes automaticamente, sem necessidade de dividi-los manualmente.
        </div>
        <input type="file" id="file_${tid}" accept=".xlsx" style="display:none" onchange="handleArquivo('${tid}', this.files[0])">
      </div>`;
  }
  return `
    <div class="tpl-inline-block">
      <label>Operação</label>
      <div class="op-choice">
        ${tpl.operacoesPermitidas.map(op=>`<div class="opt ${st.operacao===op?'sel':''}" onclick="selecionarOperacao('${tid}','${op}')">${OPERACAO_META[op].label}</div>`).join('')}
      </div>
      <small class="hint">${OPERACAO_META[st.operacao].desc}</small>
      ${corpo}
    </div>
  `;
}
function selecionarOperacao(tid, op){ migAtual().templatesState[tid].operacao = op; renderAll(); }

// tamanho de lote de processamento (equivalente ao "tamanho de lote" citado na Seção 10.1
// do documento de especificação) — arquivos grandes são fatiados automaticamente pelo motor,
// nunca pelo usuário.
const TAMANHO_LOTE_PROCESSAMENTO = 250;

function handleArquivo(tid, file){
  if(!file) return;
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  st.arquivoOriginal = file;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
      const ws = wb.Sheets[tpl.sheetName] || wb.Sheets[wb.SheetNames[0]];
      const grid = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
      const rows = grid.slice(tpl.dataStartRow-1).filter(r=>r && r.some(v=>v!==''&&v!==undefined&&v!==null));
      st._filaBruta = rows;
      st.totalLinhas = rows.length;
      st.linhasLidas = [];
      st.linhasProcessadas = 0;
      st.pausado = false;
      st.status = 'processando';
      renderAll();
      // divide automaticamente em lotes de tamanho fixo e processa de forma assincrona (setTimeout
      // simula o "yield" que, em produção, seria feito por um worker em background lendo de uma fila)
      const numLotes = Math.max(1, Math.ceil(rows.length / TAMANHO_LOTE_PROCESSAMENTO));
      st._tamanhoLoteAtual = Math.ceil(rows.length / numLotes) || 1;
      processarProximoLote(tid);
    }catch(err){
      alert('Não foi possível ler o arquivo: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
function processarProximoLote(tid){
  const m = migAtual(); if(!m) return;
  const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  if(st.status!=='processando' || st.pausado) return;
  const lote = st._filaBruta.splice(0, st._tamanhoLoteAtual || TAMANHO_LOTE_PROCESSAMENTO);
  lote.forEach(r => st.linhasLidas.push(tpl.lerLinha(r)));
  st.linhasProcessadas += lote.length;
  if(st._filaBruta.length === 0){
    st.status = 'carregado';
    renderAll();
  } else {
    renderAll();
    setTimeout(()=>processarProximoLote(tid), 220);
  }
}
function pausarProcessamento(tid){ migAtual().templatesState[tid].pausado = true; renderAll(); }
function continuarProcessamento(tid){
  const st = migAtual().templatesState[tid];
  st.pausado = false; renderAll(); processarProximoLote(tid);
}
function reiniciarUpload(tid){
  const st = migAtual().templatesState[tid];
  Object.assign(st, {status:'pendente', arquivoOriginal:null, linhasLidas:[], validacoes:[], sqlGerado:'', jsonGerado:'', csvGerado:'', totalLinhas:0, linhasProcessadas:0, pausado:false});
  renderAll();
}
function renderPreviewHtml(tid){
  const m = migAtual(); const st = m.templatesState[tid];
  const rows = st.linhasLidas.slice(0,8);
  if(!rows.length) return '<div class="banner warn">Nenhuma linha de dados encontrada a partir da linha configurada.</div>';
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_'));
  return `
    <h3>Pré-visualização (${st.linhasLidas.length} linha(s) lida(s) e processada(s) em lotes, mostrando ${rows.length})</h3>
    <div class="tblwrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td class="mono">${r[c]===undefined||r[c]===null||r[c]===''?'<i style="color:#c0392b">vazio</i>':r[c]}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
    <div class="btnbar"><button class="btn" onclick="executarValidacao('${tid}')">Executar validação (${st.linhasLidas.length} linhas)</button></div>
  `;
}

function baseMockContexto(tpl){
  const baseMock = {};
  (tpl.tabelas||[]).forEach(t=> baseMock[t] = (tpl.baseMockSeed && tpl.baseMockSeed[t]) || []);
  if(tpl.baseMockSeed) Object.keys(tpl.baseMockSeed).forEach(t=> baseMock[t] = tpl.baseMockSeed[t]);
  return baseMock;
}

function executarValidacao(tid){
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  const ctx = {nrOrg:m.org.id, usuarioTecnico:'000000099991', baseMock: baseMockContexto(tpl)};
  st.validacoes = [];
  st.linhasLidas.forEach((campos, idx)=>{
    const resultados = tpl.validarLinha(campos, ctx);
    resultados.forEach(r=> st.validacoes.push({linha: idx + tpl.dataStartRow, ...r}));
  });
  st.status = st.validacoes.some(v=>v.sev==='erro') ? 'com erro' : 'validado';
  m.status = 'em validacao';
  m.abaAtiva = 'validacao';
  renderAll();
}

/* ---------- ABA: VALIDAÇÃO ---------- */
function abaValidacao(m){
  const templatesComDados = m.tipo.templates.filter(tid=>m.templatesState[tid].linhasLidas.length);
  if(!templatesComDados.length) return '<div class="banner info">Nenhum template importado ainda. Vá para a aba "Templates & Upload".</div>';
  return templatesComDados.map(tid=>{
    const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
    const nErros = st.validacoes.filter(v=>v.sev==='erro').length;
    return `
      <h3>${tpl.nome} <span class="hint">(${st.linhasLidas.length} linhas, ${st.validacoes.length} ocorrência(s))</span></h3>
      ${nErros>0 ? `<div class="banner block">${nErros} erro(s) impeditivo(s) — corrija antes de aprovar os dados.</div>` : `<div class="banner ok">Sem erros impeditivos.</div>`}
      <div class="tblwrap">
        <table>
          <thead><tr><th>Severidade</th><th>Linha</th><th>Campo</th><th>Recebido</th><th>Esperado</th><th>Orientação</th></tr></thead>
          <tbody>
            ${st.validacoes.map(v=>`
              <tr>
                <td><span class="badge ${SEV_META[v.sev].cls}">${SEV_META[v.sev].label}</span></td>
                <td>${v.linha}</td>
                <td class="mono">${v.campo}</td>
                <td class="mono">${v.ajustado ? `<div class="diff"><span class="old">${v.recebido}</span><span class="new">${v.ajustado}</span></div>` : v.recebido}</td>
                <td>${v.esperado}</td>
                <td>${v.orientacao}</td>
              </tr>`).join('') || '<tr><td colspan="6">Nenhuma ocorrência — todos os registros passaram integralmente.</td></tr>'}
          </tbody>
        </table>
      </div>
      <div class="btnbar">
        <button class="btn secondary" onclick="exportarInconsistencias('${tid}')">Exportar planilha de inconsistências (.csv)</button>
      </div>
    `;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:18px 0;">')
  + `<div class="btnbar"><button class="btn" onclick="mudarAba('aprovacao')">Ir para aprovação de dados</button></div>`;
}
function exportarInconsistencias(tid){
  const m = migAtual(); const st = m.templatesState[tid];
  baixarArquivo(`inconsistencias_${tid}.csv`, toCSV(st.validacoes), 'text/csv');
}

/* ---------- ABA: APROVAÇÃO DE DADOS (por template, individual) ---------- */
function abaAprovacao(m){
  const templatesComDados = m.tipo.templates.filter(tid=>m.templatesState[tid].linhasLidas.length);
  if(!templatesComDados.length) return `<div class="banner info">Nenhum template com dados importados ainda. Faça o upload na aba "Templates & Upload".</div>`;
  return templatesComDados.map(tid=>{
    const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
    const errLinhas = new Set(st.validacoes.filter(v=>v.sev==='erro').map(v=>v.linha));
    const validos = st.linhasLidas.length - errLinhas.size;
    const alertas = st.validacoes.filter(v=>v.sev==='alerta').length;
    const temErro = errLinhas.size>0;
    return `
      <h3>${tpl.nome} ${st.dadosAprovados ? '<span class="badge green">Dados aprovados</span>' : ''}</h3>
      <div class="counters">
        <div class="counter"><div class="n">${st.linhasLidas.length}</div><div class="l">Recebidos</div></div>
        <div class="counter"><div class="n" style="color:var(--green)">${validos}</div><div class="l">Válidos</div></div>
        <div class="counter"><div class="n" style="color:var(--red)">${errLinhas.size}</div><div class="l">Rejeitados</div></div>
        <div class="counter"><div class="n" style="color:var(--orange)">${alertas}</div><div class="l">Alertas</div></div>
      </div>
      ${temErro ? `<div class="banner block">Existem erros impeditivos pendentes neste template — resolva-os na aba Validação antes de aprovar.</div>` : ''}
      <div class="btnbar">
        ${st.dadosAprovados
          ? `<span class="hint">Aprovado por ${m.operador} — este template já pode seguir para geração de script.</span>`
          : `<button class="btn success" ${temErro?'disabled':''} onclick="aprovarDadosTemplate('${tid}')">Aprovar dados de ${tpl.nome}</button>`}
      </div>
    `;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:18px 0;">');
}
function todosDadosAprovados(m){
  const comDados = m.tipo.templates.filter(tid=>m.templatesState[tid].linhasLidas.length);
  return comDados.length>0 && comDados.every(tid=>m.templatesState[tid].dadosAprovados);
}
function aprovarDadosTemplate(tid){
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  if(st.validacoes.some(v=>v.sev==='erro')){ alert('Existem erros impeditivos pendentes neste template.'); return; }
  st.dadosAprovados = true;
  m.trilha.push({evento:`Dados aprovados — ${tpl.nome}`, usuario:m.operador, data:new Date().toLocaleString('pt-BR')});
  if(todosDadosAprovados(m)){ m.dadosAprovados = true; m.status = 'aguardando aprovacao'; }
  m.abaAtiva = 'scripts';
  renderAll();
}

/* ---------- ABA: GERAÇÃO DE SCRIPTS ---------- */
function abaScripts(m){
  const comDados = m.tipo.templates.filter(tid=>m.templatesState[tid].linhasLidas.length);
  if(!comDados.length) return `<div class="banner info">Nenhum template com dados importados ainda.</div>`;
  return comDados.map(tid=>{
    const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
    if(!st.dadosAprovados){
      return `<h3>${tpl.nome}</h3><div class="banner info">Aguardando aprovação dos dados deste template (aba "Aprovação de Dados") antes de gerar o script.</div>`;
    }
    return `
      <h3>${tpl.nome} <span class="badge ${OPERACAO_META[st.operacao].cls}">${OPERACAO_META[st.operacao].label}</span> ${st.scriptAprovado ? '<span class="badge green">Aprovado tecnicamente</span>' : ''}</h3>
      ${st.sqlGerado
        ? `<div class="codebox">${st.sqlGerado.slice(0,3000)}</div>
           <div class="btnbar">
             <button class="btn secondary small" onclick="baixarArquivo('${tid}_script.sql', migAtual().templatesState['${tid}'].sqlGerado, 'application/sql')">Baixar .sql</button>
             <button class="btn secondary small" onclick="baixarArquivo('${tid}_dados.json', migAtual().templatesState['${tid}'].jsonGerado, 'application/json')">Baixar .json</button>
             <button class="btn secondary small" onclick="baixarArquivo('${tid}_dados.csv', migAtual().templatesState['${tid}'].csvGerado, 'text/csv')">Baixar .csv</button>
           </div>
           ${!st.scriptAprovado ? `<div class="hint" style="margin-top:6px;">Vá para a aba "Aprovação Técnica" para revisar e aprovar este script individualmente.</div>` : ''}`
        : `<button class="btn secondary" onclick="gerarScriptTemplate('${tid}')">Gerar script (${OPERACAO_META[st.operacao].label})</button>`
      }
    `;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:18px 0;">');
}
function buildUpdateGenerico(tabela, campos, pkFields, ctx){
  const sets = Object.keys(campos).filter(k=>!k.startsWith('_') && !pkFields.includes(k)).map(k=> typeof campos[k]==='number' ? `${k} = ${campos[k]}` : `${k} = '${campos[k]}'`);
  const wheres = pkFields.map(k=> typeof campos[k]==='number' ? `${k} = ${campos[k]}` : `${k} = '${campos[k]}'`);
  return `UPDATE ${tabela} SET ${sets.join(', ')} WHERE NRORG = ${ctx.nrOrg} AND ${wheres.join(' AND ')};`;
}
function buildDeleteGenerico(tabela, campos, pkFields, ctx){
  const wheres = pkFields.map(k=> typeof campos[k]==='number' ? `${k} = ${campos[k]}` : `${k} = '${campos[k]}'`);
  return `DELETE FROM ${tabela} WHERE NRORG = ${ctx.nrOrg} AND ${wheres.join(' AND ')};`;
}
function computarInsertLinha(tpl, campos, ctx){
  let pk = {};
  if(tpl.pkGeracao){
    tpl.pkGeracao.forEach(p=>{
      const usados = new Set((ctx.baseMock[p.tabela]||[]).map(r=>Object.values(r)[0]));
      pk[p.campo] = pkProximoLivre(ctx.nrOrg, p.campo, p.seed, usados);
    });
  }
  return tpl.gerarInsert(campos, ctx, pk);
}
function gerarScriptTemplate(tid){
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  const ctx = {nrOrg:m.org.id, usuarioTecnico:'000000099991', baseMock: baseMockContexto(tpl)};
  const linhas = [];
  st.linhasLidas.forEach((campos, idx)=>{
    const errLinha = st.validacoes.some(v=>v.linha===idx+tpl.dataStartRow && v.sev==='erro');
    if(errLinha) return;
    if(st.operacao==='INCLUSAO'){
      linhas.push(computarInsertLinha(tpl, campos, ctx));
    } else if(st.operacao==='ALTERACAO'){
      (tpl.pkFields ? Object.entries(tpl.pkFields) : []).forEach(([tabela,pkFields])=>{
        linhas.push(buildUpdateGenerico(tabela, campos, pkFields, ctx));
      });
    } else if(st.operacao==='EXCLUSAO'){
      (tpl.pkFields ? Object.entries(tpl.pkFields) : []).forEach(([tabela,pkFields])=>{
        linhas.push(buildDeleteGenerico(tabela, campos, pkFields, ctx));
      });
    }
  });
  st.sqlGerado = linhas.join('\n');
  st.jsonGerado = JSON.stringify(st.linhasLidas, null, 2);
  st.csvGerado = toCSV(st.linhasLidas);
  renderAll();
}
/* ---------- ABA: APROVAÇÃO TÉCNICA (por script, individual) ---------- */
function abaAprovacaoTecnica(m){
  const comScript = m.tipo.templates.filter(tid=>m.templatesState[tid].sqlGerado);
  if(!comScript.length) return `<div class="banner info">Nenhum script gerado ainda — gere na aba "Geração de Scripts".</div>`;
  return `<div class="desc">Perfil: Aprovador Técnico (segregado do Aprovador Funcional). Cada script é aprovado individualmente — não é necessário aprovar todos de uma vez.</div>`
  + comScript.map(tid=>{
    const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
    return `
      <h3>${tpl.nome} ${st.scriptAprovado ? '<span class="badge green">Aprovado</span>' : '<span class="badge orange">Aguardando aprovação técnica</span>'}</h3>
      <div class="codebox">${st.sqlGerado.slice(0,1500)}</div>
      ${st.scriptAprovado
        ? `<div class="hint">Aprovado por ${m.operador}.</div>`
        : `<div class="checkline"><input type="checkbox" id="chk1_${tid}"> Conteúdo do script revisado e consistente com os dados aprovados</div>
           <div class="checkline"><input type="checkbox" id="chk2_${tid}"> Banco de destino (${BANCOS.find(b=>b.id===m.banco).nome}) confirmado</div>
           <div class="btnbar"><button class="btn success" onclick="aprovarScriptTemplate('${tid}')">Aprovar script de ${tpl.nome}</button></div>`}
    `;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:18px 0;">');
}
function todosScriptsAprovados(m){
  const comScript = m.tipo.templates.filter(tid=>m.templatesState[tid].sqlGerado);
  return comScript.length>0 && comScript.every(tid=>m.templatesState[tid].scriptAprovado);
}
function aprovarScriptTemplate(tid){
  if(!document.getElementById('chk1_'+tid).checked || !document.getElementById('chk2_'+tid).checked){
    alert('Confirme todos os itens antes de aprovar este script.'); return;
  }
  const m = migAtual(); const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
  st.scriptAprovado = true;
  m.trilha.push({evento:`Script aprovado — ${tpl.nome}`, usuario:m.operador, data:new Date().toLocaleString('pt-BR')});
  if(todosScriptsAprovados(m)){ m.scriptAprovado = true; m.status = 'aguardando aplicacao'; }
  m.abaAtiva = 'execucao';
  renderAll();
}

/* ---------- ABA: EXECUÇÃO ---------- */
function abaExecucao(m){
  const aprovados = m.tipo.templates.filter(tid=>m.templatesState[tid].scriptAprovado);
  if(!aprovados.length) return `<div class="banner info">Nenhum script aprovado tecnicamente ainda — aprove ao menos um na aba "Aprovação Técnica".</div>`;
  const aplicados = aprovados.filter(tid=>m.templatesState[tid].execucaoStatus==='aplicado').length;
  const progresso = Math.round((aplicados/aprovados.length)*100);
  return `
    <div class="progressbar"><div class="fill" style="width:${progresso}%"></div></div>
    <small class="hint">${aplicados} de ${aprovados.length} script(s) aprovado(s) aplicado(s) neste banco (${progresso}%) — cada script pode ser aplicado individualmente, assim que aprovado.</small>
    ` + aprovados.map(tid=>{
      const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
      const aplicando = st.execucaoStatus==='aplicando';
      const aplicado = st.execucaoStatus==='aplicado';
      return `
        <div class="loglist" style="margin-top:14px;">
          <div class="logline">
            <span class="dot ${aplicado?'ok':'pending'}"></span>
            ${tpl.nome} — ${aplicado ? `aplicado com sucesso (${st.linhasLidas.length} linha(s)).` : aplicando ? 'aplicando…' : 'aprovado, aguardando aplicação.'}
          </div>
          ${!aplicado ? `<div class="btnbar"><button class="btn" ${aplicando?'disabled':''} onclick="aplicarScriptTemplate('${tid}')">${aplicando?'Aplicando…':`Aplicar script de ${tpl.nome}`}</button></div>` : ''}
        </div>`;
    }).join('')
  + (aplicados===aprovados.length ? `<div class="btnbar"><button class="btn" onclick="finalizarMigracao()">Ver relatório final</button></div>` : '');
}
function aplicarScriptTemplate(tid){
  const m = migAtual(); const st = m.templatesState[tid];
  m.status = 'em execucao';
  st.execucaoStatus = 'aplicando';
  renderAll();
  setTimeout(()=>{
    st.execucaoStatus = 'aplicado';
    m.execucaoLog.push({ok:true, texto:`${TEMPLATE_CATALOG[tid].nome} — script aplicado com sucesso (${st.linhasLidas.length} linha(s)).`});
    m.trilha.push({evento:`Script aplicado — ${TEMPLATE_CATALOG[tid].nome}`, usuario:m.operador, data:new Date().toLocaleString('pt-BR')});
    const aprovados = m.tipo.templates.filter(t=>m.templatesState[t].scriptAprovado);
    m.execucaoProgresso = Math.round((aprovados.filter(t=>m.templatesState[t].execucaoStatus==='aplicado').length/aprovados.length)*100);
    renderAll();
  }, 650);
}
function finalizarMigracao(){
  const m = migAtual();
  const temAlerta = m.tipo.templates.some(tid=>m.templatesState[tid].validacoes.some(v=>v.sev==='alerta'));
  m.status = temAlerta ? 'concluida alertas' : 'concluida';
  m.trilha.push({evento:'Migração concluída', usuario:m.operador, data:new Date().toLocaleString('pt-BR')});
  m.abaAtiva = 'relatorio';
  renderAll();
}

/* ---------- ABA: RELATÓRIO FINAL ---------- */
function abaRelatorio(m){
  let recebidos=0, alertas=0, erros=0;
  m.tipo.templates.forEach(tid=>{ const st=m.templatesState[tid]; recebidos+=st.linhasLidas.length; alertas+=st.validacoes.filter(v=>v.sev==='alerta').length; erros+=st.validacoes.filter(v=>v.sev==='erro').length; });
  return `
    <div class="banner ${m.status==='concluida'?'ok':'warn'}">${badge(m.status)} — organização liberada para iniciar uma nova migração.</div>
    <div class="counters">

/* ---------- ABA: DOWNLOADS ---------- */
function abaDownloads(m){
  return `
    <div class="desc">Disponibilidade dos arquivos reflete o status atual da migração — cada artefato aparece assim que é gerado na etapa correspondente.</div>
    <table>
      <thead><tr><th>Template</th><th>Arquivo original</th><th>.json (staging)</th><th>.csv (staging)</th><th>.sql (script)</th></tr></thead>
      <tbody>
        ${m.tipo.templates.map(tid=>{
          const tpl = TEMPLATE_CATALOG[tid]; const st = m.templatesState[tid];
          return `<tr>
            <td><b>${tpl.nome}</b></td>
            <td>${st.arquivoOriginal ? `<button class="btn secondary small" onclick="baixarOriginal('${tid}')">Baixar .xlsx</button>` : '<span class="hint">não enviado</span>'}</td>
            <td>${st.jsonGerado ? `<button class="btn secondary small" onclick="baixarArquivo('${tid}.json', migAtual().templatesState['${tid}'].jsonGerado, 'application/json')">Baixar</button>` : '<span class="hint">pendente</span>'}</td>
            <td>${st.csvGerado ? `<button class="btn secondary small" onclick="baixarArquivo('${tid}.csv', migAtual().templatesState['${tid}'].csvGerado, 'text/csv')">Baixar</button>` : '<span class="hint">pendente</span>'}</td>
            <td>${st.sqlGerado ? `<button class="btn secondary small" onclick="baixarArquivo('${tid}.sql', migAtual().templatesState['${tid}'].sqlGerado, 'application/sql')">Baixar</button>` : '<span class="hint">pendente</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}
function baixarOriginal(tid){
  const st = migAtual().templatesState[tid];
  baixarBlobOriginal(st.arquivoOriginal, st.arquivoOriginal.name);
}
