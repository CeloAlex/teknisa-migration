{% extends "base.html" %}
{% block titulo %}Nova migração{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>Nova migração</h2>
  {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
  <form method="post" action="/portal-migration/migracoes/nova">
    <div class="field">
      <label for="nr_org">Organização</label>
      <select id="nr_org" name="nr_org" required>
        {% for org in organizacoes %}
        <option value="{{ org.nr_org }}">{{ org.nome }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="tipo_migracao_codigo">Tipo de migração</label>
      <select id="tipo_migracao_codigo" name="tipo_migracao_codigo" required>
        {% for tipo in tipos %}
        <option value="{{ tipo.codigo }}">{{ tipo.nome }} ({{ tipo.banco_destino }})</option>
        {% endfor %}
      </select>
    </div>
    <small class="hint">O operador responsável será registrado como {{ usuario.nome }} (usuário logado).</small>
    <div class="btnbar">
      <a class="btn secondary" href="/portal-migration/">Cancelar</a>
      <button class="btn" type="submit">Criar migração</button>
    </div>
  </form>
</div>
{% endblock %}
