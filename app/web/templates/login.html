<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Plataforma de Migração de Dados</title>
  <link rel="stylesheet" href="/portal-migration/static/css/app.css">
</head>
<body>
<div class="login-wrap">
  <div class="card login-card">
    <h2>Plataforma de Migração de Dados</h2>
    <div class="desc">Teknisa — ERP/HCM</div>
    {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
    <form method="post" action="/portal-migration/login">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required>
      </div>
      <div class="btnbar">
        <button class="btn" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
