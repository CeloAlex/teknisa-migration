{% extends "base.html" %}
{% block titulo %}Novo tipo de migração{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>Criar novo tipo de migração</h2>
  {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
  <form method="post" action="/portal/admin/tipos-migracao/novo">
    <div class="grid2">
      <div class="field">
        <label for="codigo">Código</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
      </div>
      <div class="field">
        <label for="banco_destino">Banco de destino</label>
        <input type="text" id="banco_destino" name="banco_destino" required>
      </div>
      <div class="field">
        <label for="modo_aplicacao">Modo de aplicação</label>
        <select id="modo_aplicacao" name="modo_aplicacao">
          <option value="SCRIPT">Script (.sql manual)</option>
          <option value="DIRETO">Aplicação direta</option>
        </select>
      </div>
    </div>
    <div class="checkline">
      <input type="checkbox" id="sequencia_obrigatoria" name="sequencia_obrigatoria" value="true">
      <label for="sequencia_obrigatoria" style="margin:0;">Sequência travada entre templates (Seção 26.3)</label>
    </div>
    <div class="checkline">
      <input type="checkbox" id="permite_concorrencia" name="permite_concorrencia" value="true">
      <label for="permite_concorrencia" style="margin:0;">Permite mais de uma migração ativa simultânea por organização</label>
    </div>
    <div class="btnbar">
      <a class="btn secondary" href="/portal/admin/tipos-migracao">Cancelar</a>
      <button class="btn" type="submit">Criar</button>
    </div>
  </form>
</div>
{% endblock %}
