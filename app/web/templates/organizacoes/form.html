{% extends "base.html" %}
{% block titulo %}Nova organização{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>Nova organização</h2>
  {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
  <form method="post" action="/portal/admin/organizacoes/nova">
    <div class="field">
      <label for="nr_org">Número da organização</label>
      <input type="number" id="nr_org" name="nr_org" required>
    </div>
    <div class="field">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required>
    </div>
    <div class="btnbar">
      <a class="btn secondary" href="/portal/admin/organizacoes">Cancelar</a>
      <button class="btn" type="submit">Criar</button>
    </div>
  </form>
</div>
{% endblock %}
