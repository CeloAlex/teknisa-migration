{% extends "base.html" %}
{% block titulo %}Novo template{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>Criar novo template</h2>
  {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
  <form method="post" action="/portal/admin/templates/novo">
    <div class="grid2">
      <div class="field">
        <label for="codigo">Código</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
      </div>
      <div class="field">
        <label for="versao">Versão</label>
        <input type="text" id="versao" name="versao" value="1.0">
      </div>
      <div class="field">
        <label for="formatos_aceitos">Formatos aceitos (separados por vírgula)</label>
        <input type="text" id="formatos_aceitos" name="formatos_aceitos" value="XLSX">
      </div>
      <div class="field">
        <label for="sheet_name">Nome da planilha (sheet)</label>
        <input type="text" id="sheet_name" name="sheet_name">
      </div>
      <div class="field">
        <label for="header_row">Linha do cabeçalho</label>
        <input type="number" id="header_row" name="header_row">
      </div>
      <div class="field">
        <label for="data_start_row">Linha inicial dos dados</label>
        <input type="number" id="data_start_row" name="data_start_row">
      </div>
      <div class="field">
        <label for="eh_catalogo">Template de catálogo (parametrização compartilhada)?</label>
        <input type="checkbox" id="eh_catalogo" name="eh_catalogo" value="true" style="width:auto;">
      </div>
    </div>
    <div class="field">
      <label for="pre_requisito_externo">Pré-requisito externo (texto exibido ao operador, opcional)</label>
      <textarea id="pre_requisito_externo" name="pre_requisito_externo"></textarea>
    </div>
    <div class="btnbar">
      <a class="btn secondary" href="/portal/admin/templates">Cancelar</a>
      <button class="btn" type="submit">Criar</button>
    </div>
  </form>
</div>
{% endblock %}
