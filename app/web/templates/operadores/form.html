{% extends "base.html" %}
{% block titulo %}{{ "Editar operador" if operador else "Novo operador" }}{% endblock %}
{% block conteudo %}
<div class="card">
  <h2>{{ "Editar operador" if operador else "Novo operador" }}</h2>
  {% if erro %}<div class="flash erro">{{ erro }}</div>{% endif %}
  <form method="post" action="{{ '/portal-migration/admin/operadores/' ~ operador.id ~ '/editar' if operador else '/portal-migration/admin/operadores/novo' }}">
    <div class="grid2">
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ operador.nome if operador else '' }}" required>
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" value="{{ operador.email if operador else '' }}" required>
      </div>
      <div class="field">
        <label for="cargo">Cargo</label>
        <input type="text" id="cargo" name="cargo" value="{{ operador.cargo if operador else '' }}">
      </div>
      <div class="field">
        <label for="papel">Papel</label>
        <select id="papel" name="papel" required>
          {% for valor, rotulo in papel_opcoes %}
          <option value="{{ valor }}" {% if operador and operador.papel == valor %}selected{% endif %}>{{ rotulo }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field" id="campo-organizacao">
        <label for="nr_org">Organização</label>
        <select id="nr_org" name="nr_org">
          {% for org in organizacoes %}
          <option value="{{ org.nr_org }}" {% if operador and operador.nr_org == org.nr_org %}selected{% endif %}>{{ org.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="senha">{{ "Nova senha (deixe em branco para manter)" if operador else "Senha" }}</label>
        <input type="password" id="senha" name="senha" {% if not operador %}required{% endif %} minlength="8">
      </div>
    </div>
    <div class="btnbar">
      <a class="btn secondary" href="/portal-migration/admin/operadores">Cancelar</a>
      <button class="btn" type="submit">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
